# Build swooshhh.exe and attach to GitHub Release.
# Create a Release (e.g. v1.0.0) on the Releases page to trigger this.
name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build swooshhh.exe
        run: |
          if (Test-Path swooshhh_logo.png) {
            python -c "from PIL import Image; i=Image.open('swooshhh_logo.png').convert('RGBA'); i.save('swooshhh.ico', format='ICO', sizes=[(256,256),(48,48),(32,32),(16,16)])"
          }
          if (Test-Path swooshhh.ico) {
            pyinstaller --onefile --windowed --name swooshhh swooshhh.py --add-data "swooshhh_logo.png;." --icon swooshhh.ico
          } elseif (Test-Path swooshhh_logo.png) {
            pyinstaller --onefile --windowed --name swooshhh swooshhh.py --add-data "swooshhh_logo.png;."
          } else {
            pyinstaller --onefile --windowed --name swooshhh swooshhh.py
          }

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/swooshhh.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
